options:
steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'asia-south1-docker.pkg.dev/iam-monitoring-500903/cloud-run-repo/cloudrun-demo:latest', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'asia-south1-docker.pkg.dev/iam-monitoring-500903/cloud-run-repo/cloudrun-demo:latest']

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - run
  - deploy
  - cloudrun-demo
  - --image
  - asia-south1-docker.pkg.dev/iam-monitoring-500903/cloud-run-repo/cloudrun-demo:latest
  - --region
  - asia-south1
  - --platform
  - managed
  - --allow-unauthenticated
options:
  logging: CLOUD_LOGGING_ONLY
